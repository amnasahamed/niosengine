services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: niostech-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS:-1}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?Set N8N_BASIC_AUTH_PASSWORD in .env}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Kolkata}
      - TZ=${TZ:-Asia/Kolkata}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - niostech

  whatsapp-bridge:
    build:
      context: ./whatsapp-bridge
      dockerfile: Dockerfile
    container_name: niostech-whatsapp
    restart: unless-stopped
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/whatsapp-crm}
      - N8N_HEALTH_URL=${N8N_HEALTH_URL:-http://n8n:5678/healthz}
      - PORT=3001
      - QR_ACCESS_TOKEN=${QR_ACCESS_TOKEN:?Set QR_ACCESS_TOKEN in .env}
      - ALLOWLIST=${ALLOWLIST:-}
      - WEBHOOK_RETRIES=${WEBHOOK_RETRIES:-3}
      - MEDIA_DIR=/app/media
      - MEDIA_BASE_URL=${MEDIA_BASE_URL:-http://niostech-whatsapp:3001}
      - MEDIA_MAX_MB=${MEDIA_MAX_MB:-15}
      - MEDIA_TTL_DAYS=${MEDIA_TTL_DAYS:-14}
      - ASSETS_DIR=/app/assets
      - SEND_MAX_MB=${SEND_MAX_MB:-64}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth
      - whatsapp_media:/app/media
      - ./whatsapp-bridge/assets:/app/assets
    ports:
      - "3001:3001"
    shm_size: "512mb"
    networks:
      - niostech

volumes:
  n8n_data:
  whatsapp_auth:
  whatsapp_media:

networks:
  niostech:
    driver: bridge

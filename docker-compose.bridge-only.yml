# Use this when n8n + Traefik are ALREADY running (your current setup).
# Do NOT use the root docker-compose.yml — it would start a second n8n.

services:
  whatsapp-bridge:
    build:
      context: ./whatsapp-bridge
      dockerfile: Dockerfile
    container_name: niostech-whatsapp
    restart: unless-stopped
    environment:
      # Reach existing n8n container on the shared Docker network
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/whatsapp-crm}
      - N8N_HEALTH_URL=${N8N_HEALTH_URL:-http://n8n:5678/healthz}
      - PORT=3001
      - QR_ACCESS_TOKEN=${QR_ACCESS_TOKEN:?Set QR_ACCESS_TOKEN in .env}
      - ASSETS_UI_TOKEN=${ASSETS_UI_TOKEN:?Set ASSETS_UI_TOKEN in .env}
      - ALLOWLIST=${ALLOWLIST:-}
      - WEBHOOK_RETRIES=${WEBHOOK_RETRIES:-3}
      - MEDIA_DIR=/app/media
      - MEDIA_BASE_URL=${MEDIA_BASE_URL:-http://niostech-whatsapp:3001}
      - MEDIA_MAX_MB=${MEDIA_MAX_MB:-15}
      - MEDIA_TTL_DAYS=${MEDIA_TTL_DAYS:-14}
      - ASSETS_DIR=/app/assets
      - SEND_MAX_MB=${SEND_MAX_MB:-64}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth
      - whatsapp_media:/app/media
      - ./whatsapp-bridge/assets:/app/assets
    ports:
      - "3001:3001"
    shm_size: "512mb"
    networks:
      - n8n_default

volumes:
  whatsapp_auth:
  whatsapp_media:

networks:
  n8n_default:
    external: true
